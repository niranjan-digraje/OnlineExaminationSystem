<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Exam</title>

<!-- Bootstrap CSS -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Bootstrap Icons -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- External CSS -->

<link rel="stylesheet"
href="../../CSS/TEACHER/createexam.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-3">

            <i class="bi bi-mortarboard-fill me-2"></i>

            Online Examination System

        </a>



        <div class="admin-profile text-white">

            <i class="bi bi-person-circle me-2"></i>

            Admin Profile

        </div>

    </div>

</nav>



<!-- ================= PAGE CONTAINER ================= -->

<div class="container-fluid page-container">

    <!-- TITLE -->

    <h1 class="page-title">

        CREATE EXAM

    </h1>




    <!-- MAIN CARD -->

    <div class="card main-card">

        <!-- TOP SECTION -->

        <div class="top-box">

            <div class="left-box">

                <div class="icon-box">

                    <i class="bi bi-file-earmark-plus-fill"></i>

                </div>



                <div>

                    <h3>Create New Exam</h3>

                    <p>
                        Fill in the details below to create a new exam.
                    </p>

                </div>

            </div>

        </div>

        <hr>

        <!-- FORM -->

        <form>

            <div class="row g-4">

                <!-- EXAM NAME -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Exam Name <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-pencil-fill"></i>

                        </span>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter exam name">

                    </div>

                </div>



                <!-- SUBJECT -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Select Subject <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-book-fill"></i>

                        </span>

                        <select class="form-select">

                            <option>Select subject</option>
                            <option>Java</option>
                            <option>DBMS</option>
                            <option>HTML</option>

                        </select>

                    </div>

                </div>



                <!-- TOTAL MARKS -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Total Marks <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-award-fill"></i>

                        </span>

                        <input type="number"
                               class="form-control"
                               placeholder="Enter total marks">

                    </div>

                </div>



                <!-- PASSING MARKS -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Passing Marks <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-bullseye"></i>

                        </span>

                        <input type="number"
                               class="form-control"
                               placeholder="Enter passing marks">

                    </div>

                </div>



                <!-- EXAM DATE -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Exam Date <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-calendar-event-fill"></i>

                        </span>

                        <input type="date"
                               class="form-control">

                    </div>

                </div>



                <!-- EXAM TIME -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Exam Time <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-clock-fill"></i>

                        </span>

                        <input type="time"
                               class="form-control">

                    </div>

                </div>



                <!-- DURATION -->

                <div class="col-md-6">

                    <label class="form-label fw-bold">

                        Duration (In Minutes) <span>*</span>

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-stopwatch-fill"></i>

                        </span>

                        <input type="number"
                               class="form-control"
                               placeholder="Enter duration">

                    </div>

                </div>



                <!-- INSTRUCTION -->

            

            </div>



            <!-- BUTTONS -->

            <div class="button-box">

                <button class="btn btn-primary create-btn">

                    <i class="bi bi-floppy-fill me-2"></i>

                    CREATE EXAM

                </button>


            </div>

        </form>

    </div>

</div>



<!-- ================= FOOTER ================= -->

<footer>

    © 2026 Online Examination System | All Rights Reserved

</footer>

<script src="../../JS/TEACHER/createexam.js"></script>

</body>
</html>
