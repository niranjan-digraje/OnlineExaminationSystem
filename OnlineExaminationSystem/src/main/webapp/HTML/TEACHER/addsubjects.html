<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Subject</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="../../CSS/TEACHER/addsubjects.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-3" href="teacherdashboard.html">
            <i class="bi bi-mortarboard-fill me-2"></i>
            Online Examination System
        </a>

        <div class="admin-profile text-white">
            <i class="bi bi-person-circle me-2"></i>
            Admin Profile
        </div>

    </div>
</nav>

<div class="container page-container">

    <h1 class="page-title">ADD SUBJECT</h1>

    <!-- <div class="title-line">
        <span></span>
        <i class="bi bi-circle-fill"></i>
        <span></span>
    </div> -->

    
    <div class="card subject-card">

        <div class="card-heading">
            <div class="icon-box">
                <i class="bi bi-book-fill"></i>
            </div>

            <div>
                <h3>Add New Subject</h3>
                <p>Fill in the details below to add a new subject.</p>
            </div>
        </div>

        <hr>

        <form name="subjectForm" onsubmit="return validateSubjectForm()">

            <div class="mb-4">
                <label class="form-label fw-bold">
                    Subject Name <span>*</span>
                </label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-book"></i>
                    </span>

                    <input type="text"
                           name="subjectName"
                           class="form-control"
                           placeholder="Enter subject name">
                </div>
            </div>

            </div>

            <div class="button-box">
                <button type="submit" class="btn btn-primary add-btn">
                    <i class="bi bi-plus-lg me-2"></i>
                    ADD SUBJECT
                </button>

            </div>

        </form>

    </div>

    <div class="card subject-card m-4">

        <div class="card-heading">
            <div class="icon-box">
                <i class="bi bi-card-list"></i>
            </div>

            <div>
                <h3>Subject List</h3>
            </div>
        </div>

        <div class="table-responsive mt-3">

            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>SR.NO</th>
                        <th>Subject Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Computer Science</td>
                        <td>
                            <button class="btn btn-primary btn-sm me-2">
                                <i class="bi bi-pencil-fill"></i>
                            </button>

                            <button class="btn btn-danger btn-sm">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>



        </div>

    </div>

</div>

<footer>
    © 2026 Online Examination System | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../JS/TEACHER/addsubjects.js"></script>

</body>
</html>
