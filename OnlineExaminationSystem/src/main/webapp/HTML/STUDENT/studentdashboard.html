<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- External CSS -->
<link rel="stylesheet" href="../../CSS/STUDENT/studentdashboard.css">

</head>

<body>

<!-- ================= NAVBAR START ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container-fluid px-4">

        <!-- LOGO -->

        <a class="navbar-brand fw-bold fs-3">

            <i class="bi bi-mortarboard-fill me-2"></i>

            Online Examination System

        </a>



        <!-- STUDENT PROFILE -->

        <div class="student-profile text-white">

            <i class="bi bi-person-circle me-2"></i>

            Student Profile

        </div>

    </div>

</nav>

<!-- ================= NAVBAR END ================= -->



<!-- ================= MAIN SECTION ================= -->

<div class="container dashboard-container">

    <!-- TITLE -->

    <h1 class="dashboard-title">

        STUDENT DASHBOARD

    </h1>



    <!-- DASHBOARD ROW -->

    <div class="row g-4 mt-4 justify-content-center">



        <!-- VIEW EXAM -->

        <div class="col-md-5">

            <div class="dashboard-card">

                <div class="card-left">

                    <i class="bi bi-clipboard-check-fill dashboard-icon"></i>

                </div>



                <div class="card-center">

                    <h3>VIEW EXAM</h3>


                </div>



                <div class="card-right">

                    <i class="bi bi-arrow-right-circle-fill arrow-icon"></i>

                </div>

            </div>

        </div>



        <!-- VIEW RESULT -->

        <div class="col-md-5">

            <div class="dashboard-card">

                <div class="card-left">

                    <i class="bi bi-bar-chart-fill dashboard-icon"></i>

                </div>



                <div class="card-center">

                    <h3>VIEW RESULT</h3>


                </div>



                <div class="card-right">

                    <i class="bi bi-arrow-right-circle-fill arrow-icon"></i>

                </div>

            </div>

        </div>

        


    </div>

</div>



<!-- ================= FOOTER ================= -->

<footer> © 2026 Online Examination System | All Rights Reserved </footer>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- External JS -->
<script src="../../JS/STUDENT/studentdashboard.js"></script>

</body>
</html>
